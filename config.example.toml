# virtual-flex v0.2 configuration.
# Copy to config.toml and edit. v0.2 is K4-only and native — no hamlib/rigctld.
# (The install wizard will write this for you; shown here for manual/dev use.)
# Run with:  python -m virtualflex --config config.toml

[radio]
model    = "FLEX-8600"
serial   = "auto"          # "auto" derives from k4.hostname (K4-SN01234 -> 8600-0000-0000-1234)
version  = "3.6.19.35"     # SmartSDR version string the stack sees
nickname = "VirtualFlex"   # the name shown in SmartSDR / the Genius apps
callsign = "AB0R"

[network]
command_port      = 4992
discovery_port    = 4992
broadcast_address = "10.0.1.255"   # subnet-directed broadcast; the host must share the stack's subnet
advertise_ip      = ""              # blank = auto-detect this host's LAN IP

[k4]
ip        = "192.0.2.105"            # cached address; self-refreshed via mDNS if it stops answering
hostname  = "K4-SN01234.local"     # identity (pins the serial) + mDNS IP-refresh source
cat_port  = 9200
ptt_interval  = 0.003              # fast TQX poll for low-latency keying
freq_interval = 0.1                # FA/FB/FT/MD poll
stale_after   = 3.0                # no valid CAT response for this long => treat the K4 as absent

[presence]
present_after = 3.0                # K4 reachable this long before we advertise to the stack
absent_after  = 5.0                # K4 gone this long before we drop the stack (-> AGXL Dummy Load)
poll_interval = 0.5
