# virtual-flex config (installed as a conffile — your edits survive package upgrades).
# EDIT the values marked below, then: sudo systemctl restart virtual-flex

[radio]
model    = "FLEX-8600"
serial   = "auto"                  # "auto" derives from the K4 hostname & logs it; or pin an explicit serial. Pair the stack to whatever is logged.
version  = "3.6.19.35"
name     = "VirtualFlex"
nickname = "VirtualFlex"
callsign = "N0CALL"                 # EDIT: your callsign

[network]
command_port       = 4992
discovery_port     = 4992
broadcast_address  = "255.255.255.255"  # EDIT: subnet-directed is safest, e.g. 192.168.1.255
discovery_interval = 1.0
advertise_ip       = ""

[rig]
source = "hamlib"

[rig.hamlib]
host          = "127.0.0.1"   # local rigctld (configured in /etc/virtual-flex/rigctld.env)
port          = 4532
poll_interval = 0.1

[ptt]
source = "k4cat"              # Elecraft K4 direct-CAT TX detection; "none" disables keying

[ptt.k4cat]
host          = "K4-SNxxxxx.local"  # EDIT: K4 mDNS name (K4-SN<serial>) or IP; match K4_HOST in rigctld.env
port          = 9200
poll_interval = 0.003
